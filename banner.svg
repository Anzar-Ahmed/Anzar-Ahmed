## 👤 About Me

*   🎓 **Final-Year Undergraduate** pursuing a Bachelor of Science in **Cyber Security** at **Mehran University of Engineering and Technology (MUET)**.
*   🛡️ Focus areas include **Threat Hunting**, **Incident Response**, and **Security Automation**.
