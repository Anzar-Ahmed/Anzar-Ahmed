<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050b18"/>
      <stop offset="100%" stop-color="#0a122c"/>
    </linearGradient>

    <!-- Animated Accent -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#a855f7;#22d3ee;#10b981;#a855f7" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <!-- Strong Glow for Visibility -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1180" height="610" fill="url(#bg)" rx="24" stroke="rgba(34,211,238,0.15)" stroke-width="2"/>

  <!-- Floating background glow circles -->
  <circle cx="150" cy="150" r="130" fill="#a855f7" opacity="0.15" filter="url(#glow)"/>
  <circle cx="1000" cy="450" r="150" fill="#22d3ee" opacity="0.12" filter="url(#glow)"/>

  <!-- LEFT PANEL: ASCII ART (ANZAR - Fully Structured) -->
  <g transform="translate(45, 110)" font-family="monospace" font-weight="900" font-size="14" fill="url(#accent)" filter="url(#glow)">
    <text x="0" y="30"> █████╗ ███╗   ██╗███████╗ █████╗ ██████╗ </text>
    <text x="0" y="60">██╔══██╗████╗  ██║╚══███╔╝██╔══██╗██╔══██╗</text>
    <text x="0" y="90">███████║██╔██╗ ██║  ███╔╝ ███████║██████╔╝</text>
    <text x="0" y="120">██╔══██║██║╚██╗██║ ███╔╝  ██╔══██║██╔══██╗</text>
    <text x="0" y="150">██║  ██║██║ ╚████║███████╗██║  ██║██║  ██║</text>
    <text x="0" y="180">╚═╝  ╚═╝╚═╝  ╚═══╝╚══════╝╚═╝  ╚═╝╚═╝  ╚═╝</text>
    
    <!-- System Status Labels -->
    <g transform="translate(15, 250)" font-size="13" font-weight="bold">
      <text x="0" y="0" fill="#94a3b8" opacity="0.8">SYSTEM: ACTIVE</text>
      <text x="0" y="25" fill="#10b981">SECURE // SEC_OPS_OK</text>
    </g>
  </g>

  <!-- RIGHT PANEL: Glassmorphism Info Card -->
  <g transform="translate(470, 60)">
    <!-- Main glass card -->
    <rect x="0" y="0" width="650" height="490" rx="20" fill="rgba(15,23,42,0.6)" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

    <!-- Top Header bar (Terminal Style) -->
    <path d="M 0 20 A 20 20 0 0 1 20 0 L 630 0 A 20 20 0 0 1 650 20 L 650 50 L 0 50 Z" fill="#0f172a" fill-opacity="0.9"/>
    <circle cx="25" cy="25" r="6" fill="#ef4444" />
    <circle cx="45" cy="25" r="6" fill="#f59e0b" />
    <circle cx="65" cy="25" r="6" fill="#10b981" />
    <text x="90" y="29" fill="#64748b" font-family="monospace" font-size="13" font-weight="bold">anzarahmed@sec-ops:~</text>

    <!-- Greeting -->
    <text x="40" y="110" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-weight="900" font-size="34" fill="#ffffff">
      Hi 👋 I'm Anzar Ahmed
    </text>

    <!-- Dynamic Typing Roles -->
    <g transform="translate(40, 165)" font-family="monospace" font-size="20" font-weight="900">
      <!-- Role 1: Cyber Security Analyst -->
      <text fill="#22d3ee" x="0" y="0">
        &gt; Cyber Security Analyst
        <animate attributeName="opacity" values="1;1;0;0;1" keys="0;0.45;0.50;0.95;1" dur="8s" repeatCount="indefinite"/>
      </text>
      
      <!-- Role 2: Threat Hunter -->
      <text fill="#a855f7" x="0" y="0">
        &gt; Threat Hunter
        <animate attributeName="opacity" values="0;0;1;1;0" keys="0;0.50;0.55;0.95;1" dur="8s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Bullet Information (Optimized Sequence & Text) -->
    <g transform="translate(40, 225)" font-family="-apple-system, sans-serif" font-size="17" font-weight="600" fill="#cbd5e1">
      <!-- 1. Education/Focus (Removed Repetition) -->
      <text x="0" y="30" fill="#38bdf8">🎓  <tspan fill="#e2e8f0">Specializing in Security Operations</tspan></text>
      
      <!-- 2. Core Technical Focus -->
      <text x="0" y="70" fill="#38bdf8">⚡  <tspan fill="#e2e8f0">SOC | SIEM | Threat Detection</tspan></text>
      
      <!-- 3. Location (Moved to End) -->
      <text x="0" y="110" fill="#38bdf8">📍  <tspan fill="#e2e8f0">Pakistan</tspan></text>
    </g>

    <!-- Divider Line -->
    <line x1="40" y1="355" x2="610" y2="355" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

    <!-- Skills pills -->
    <g transform="translate(40, 380)" font-family="-apple-system, sans-serif" font-size="12" font-weight="bold">
      <!-- Row 1 -->
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="135" height="32" rx="16" fill="#1e293b" stroke="rgba(168,85,247,0.4)" stroke-width="1.5"/>
        <text x="67.5" y="20" fill="#f8fafc" text-anchor="middle">Endpoint Security</text>
      </g>
      <g transform="translate(145, 0)">
        <rect x="0" y="0" width="80" height="32" rx="16" fill="#1e293b" stroke="rgba(34,211,238,0.4)" stroke-width="1.5"/>
        <text x="40" y="20" fill="#f8fafc" text-anchor="middle">SIEM</text>
      </g>
      <g transform="translate(235, 0)">
        <rect x="0" y="0" width="135" height="32" rx="16" fill="#1e293b" stroke="rgba(16,185,129,0.4)" stroke-width="1.5"/>
        <text x="67.5" y="20" fill="#f8fafc" text-anchor="middle">Digital Forensics</text>
      </g>

      <!-- Row 2 -->
      <g transform="translate(50, 48)">
        <rect x="0" y="0" width="110" height="32" rx="16" fill="#1e293b" stroke="rgba(245,158,11,0.4)" stroke-width="1.5"/>
        <text x="55" y="20" fill="#f8fafc" text-anchor="middle">Threat Intel</text>
      </g>
      <g transform="translate(170, 48)">
        <rect x="0" y="0" width="145" height="32" rx="16" fill="#1e293b" stroke="rgba(239,68,68,0.4)" stroke-width="1.5"/>
        <text x="72.5" y="20" fill="#f8fafc" text-anchor="middle">Incident Response</text>
      </g>
    </g>
  </g>
</svg>
