<svg width="900" height="450" viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Dark Background Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#090d16"/>
    </linearGradient>

    <!-- Neon Green Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" fill="url(#bg)" rx="12" stroke="rgba(16,185,129,0.15)" stroke-width="2"/>

  <!-- Left Cyber Matrix Fall Columns (Static Backdrop) -->
  <g fill="#10b981" font-family="monospace" font-size="11" opacity="0.15">
    <text x="30" y="40">1011010011</text><text x="30" y="60">01001101</text><text x="30" y="80">110110</text>
    <text x="80" y="30">0110</text><text x="80" y="50">11011</text><text x="80" y="70">011001</text><text x="80" y="90">10101</text>
    <text x="140" y="50">11001</text><text x="140" y="70">010110</text><text x="140" y="90">1101</text>
    <text x="200" y="30">10110</text><text x="200" y="50">01101101</text><text x="200" y="70">1001</text>
    <text x="260" y="40">0101</text><text x="260" y="60">110010</text><text x="260" y="80">101</text>
  </g>

  <!-- Right Cyber Matrix Fall Columns (Static Backdrop) -->
  <g fill="#10b981" font-family="monospace" font-size="11" opacity="0.15">
    <text x="640" y="40">1101</text><text x="640" y="60">10110110</text><text x="640" y="80">0110</text>
    <text x="700" y="30">011011</text><text x="700" y="50">101</text><text x="700" y="70">11001101</text><text x="700" y="90">0110</text>
    <text x="760" y="50">1011</text><text x="760" y="70">0110011</text><text x="760" y="90">110</text>
    <text x="820" y="30">11011</text><text x="820" y="50">0101</text><text x="820" y="70">101101</text><text x="820" y="90">11001</text>
  </g>

  <!-- Animated Matrix Strings -->
  <g fill="#00ff66" font-family="monospace" font-size="13" opacity="0.4" filter="url(#glow)">
    <text x="110" y="0">101001101001
      <animate attributeName="y" values="-50;500" dur="8s" repeatCount="indefinite" />
    </text>
    <text x="230" y="0">1101101
      <animate attributeName="y" values="-50;500" dur="6s" repeatCount="indefinite" />
    </text>
    <text x="670" y="0">01101001101
      <animate attributeName="y" values="-50;500" dur="7s" repeatCount="indefinite" />
    </text>
    <text x="790" y="0">1001101
      <animate attributeName="y" values="-50;500" dur="5s" repeatCount="indefinite" />
    </text>
  </g>

  <!-- CENTER LOGO: Hacker with Laptop -->
  <g transform="translate(375, 45)">
    <!-- Hoodie Shadow/Base -->
    <path d="M 10 120 L 140 120 L 120 70 L 105 35 L 75 10 L 45 35 L 30 70 Z" fill="#0c1e15" stroke="#10b981" stroke-width="2"/>
    <!-- Face Shadow Inside Hoodie -->
    <path d="M 45 60 Q 75 40 105 60 Q 105 85 75 95 Q 45 85 45 60 Z" fill="#020617"/>
    <!-- Glowing Eye Slots (Visor Style) -->
    <path d="M 55 60 L 70 63 L 70 68 L 55 65 Z" fill="#00ff66" filter="url(#glow)"/>
    <path d="M 95 60 L 80 63 L 80 68 L 95 65 Z" fill="#00ff66" filter="url(#glow)"/>
    <!-- Laptop Base & Screen -->
    <rect x="30" y="105" width="90" height="30" rx="3" fill="#111827" stroke="#10b981" stroke-width="2"/>
    <path d="M 20 135 L 130 135 L 120 142 L 30 142 Z" fill="#1f2937" stroke="#10b981" stroke-width="2"/>
    <text x="75" y="125" fill="#00ff66" font-family="monospace" font-size="12" font-weight="bold" text-anchor="middle" filter="url(#glow)">&gt;_</text>
  </g>

  <!-- CORE BRANDING -->
  <!-- Name Tag: <ANZAR/> -->
  <text x="450" y="270" font-family="monospace" font-weight="900" font-size="64" fill="#00ff66" text-anchor="middle" filter="url(#glow)">
    &lt;ANZAR/&gt;
  </text>

  <!-- Subtitle Quote -->
  <text x="450" y="325" font-family="-apple-system, sans-serif" font-weight="600" font-size="20" fill="#e2e8f0" text-anchor="middle">
    "Securing the digital frontier, one packet at a time."
  </text>

  <!-- EMAIL INFRASTRUCTURE -->
  <g transform="translate(450, 380)">
    <!-- Envelope Icon -->
    <path d="M -150 -12 L -110 -12 L -110 12 L -150 12 Z" fill="#020617" stroke="#00ff66" stroke-width="2" filter="url(#glow)"/>
    <path d="M -150 -12 L -130 0 L -110 -12" fill="none" stroke="#00ff66" stroke-width="2"/>
    
    <!-- Email Text -->
    <!-- REPLACE WITH YOUR ACTUAL GMAIL -->
    <text x="-95" y="6" font-family="monospace" font-weight="bold" font-size="18" fill="#00ff66" filter="url(#glow)">
      anzarahmed.sec@gmail.com
    </text>
  </g>
</svg>
