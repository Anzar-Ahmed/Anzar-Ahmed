<svg width="1180" height="610" viewBox="0 0 1180 610" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Background Gradient -->
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#030712"/>
  <stop offset="100%" stop-color="#0F172A"/>
</linearGradient>

<!-- Animated Accent -->
<linearGradient id="accent" x1="0%" y1="0%" x2="100%">
  <stop offset="0%">
    <animate attributeName="stop-color" values="#7C3AED;#22D3EE;#10B981;#7C3AED" dur="8s" repeatCount="indefinite"/>
  </stop>
  <stop offset="100%" stop-color="#22D3EE"/>
</linearGradient>

<!-- Glow -->
<filter id="glow">
  <feGaussianBlur stdDeviation="3" result="blur"/>
  <feMerge>
    <feMergeNode in="blur"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

</defs>

<!-- Background -->
<rect width="1180" height="610" fill="url(#bg)" rx="20"/>

<!-- Floating particles -->
<circle cx="200" cy="100" r="2" fill="#22D3EE">
  <animate attributeName="cy" values="100;300;100" dur="6s" repeatCount="indefinite"/>
</circle>

<circle cx="900" cy="400" r="2" fill="#7C3AED">
  <animate attributeName="cy" values="400;200;400" dur="5s" repeatCount="indefinite"/>
</circle>

<!-- LEFT ASCII -->
<g font-family="monospace" font-size="13" fill="url(#accent)" filter="url(#glow)">
